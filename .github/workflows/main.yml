name: CI/CD Pipeline – aBitat (Production)

on:
  push:
    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: thieros/rapsodia-backend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Rapsodia.csproj

      - name: Run tests
        run: dotnet test Rapsodia.csproj --no-restore --verbosity normal

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ vars.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/abitat/rapsodia
            docker compose down
            docker compose up -d --force-recreate
            sleep 5
            docker compose ps

      - name: Healthcheck validation
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ vars.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            CONTAINER_NAME="abitat_rapsodia"
            PORT=10003

            CONTAINER_ID=$(docker ps --filter "name=$CONTAINER_NAME" --format "{{.ID}}")
            if [ -z "$CONTAINER_ID" ]; then
              echo "❌ Container $CONTAINER_NAME not running!"
              exit 1
            fi

            echo "Waiting for container $CONTAINER_NAME to be healthy..."
            for i in $(seq 1 30); do
              if docker exec $CONTAINER_ID curl -sf http://localhost:$PORT/health > /dev/null 2>&1; then
                echo "✅ Healthcheck passed!"
                exit 0
              fi
              echo "Attempt $i/30..."
              sleep 2
            done

            echo "❌ Healthcheck failed!"
            exit 1

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deployment failed for production"

      - name: Notify on success
        if: success()
        run: echo "✅ Deployment successful for production"
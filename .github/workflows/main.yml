name: CI/CD Pipeline
on:
  push:
    branches: [ main, develop ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Environment Variables
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
            echo "DOCKER_TARGET=production" >> $GITHUB_ENV
            echo "DOTNET_ENV=Production" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=staging" >> $GITHUB_ENV
            echo "DOCKER_TARGET=staging" >> $GITHUB_ENV
            echo "DOTNET_ENV=Staging" >> $GITHUB_ENV
          fi

      - name: Build and Push
        run: |
          docker build \
            --target ${{ env.DOCKER_TARGET }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/rapsodia-backend:${{ env.IMAGE_TAG }} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/rapsodia-backend:${{ env.IMAGE_TAG }}

      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/abitat/rapsodia
            docker compose pull
            docker compose up -d

      - name: Deploy to Staging (Malebolge)
        if: github.ref == 'refs/heads/develop'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST_STAGING }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/malebolge/rapsodia
            docker compose pull
            docker compose up -d
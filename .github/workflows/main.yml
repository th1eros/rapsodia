name: CI/CD Pipeline – Malebolge (Staging)

on:
  push:
    branches: [ develop ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: thieros/rapsodia-backend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Rapsodia.csproj

      - name: Run tests
        run: dotnet test Rapsodia.csproj --no-restore --verbosity normal

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: staging

    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: staging
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging

      - name: Run Trivy vulnerability scanning
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Deploy to staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ vars.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/th1er/malebolge/rapsodia
            docker compose pull rapsodia_staging
            docker compose up -d --force-recreate rapsodia_staging
            sleep 5
            docker compose ps

      - name: Healthcheck validation
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ vars.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            CONTAINER_NAME="rapsodia_staging"
            PORT=10001

            CONTAINER_ID=$(docker ps --filter "name=$CONTAINER_NAME" --format "{{.ID}}")
            if [ -z "$CONTAINER_ID" ]; then
              echo "❌ Container $CONTAINER_NAME not running!"
              exit 1
            fi

            echo "Waiting for container $CONTAINER_NAME to be healthy..."
            for i in $(seq 1 45); do
              if curl -sf http://localhost:$PORT/health > /dev/null 2>&1; then
                echo "✅ Healthcheck passed!"
                exit 0
              fi
              echo "Attempt $i/45..."
              sleep 3 
            done

            echo "❌ Healthcheck failed! Fetching logs..."
            docker compose logs rapsodia_staging --tail 50
            exit 1

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deployment failed for staging"

      - name: Notify on success
        if: success()
        run: echo "✅ Deployment successful for staging"
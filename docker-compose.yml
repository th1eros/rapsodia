services:
  rapsodia:
    image: thieros/rapsodia-backend:latest
    container_name: abitat_rapsodia_prod
    user: "1001:1001"
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
      - /app/logs
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: ${DATABASE_URL}
      ASPNETCORE_URLS: http://+:10000
    volumes:
      - /home/ubuntu/abitat/data/dpkeys:/root/.aspnet/DataProtection-Keys # Caminho absoluto para persistência
    ports:
      - "10000:10000"
    networks:
      - abitat_network

  gateway:
    image: nginx:stable-alpine
    container_name: abitat_gateway
    restart: always
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx:uid=101
      - /var/run:uid=101
      - /var/log/nginx:uid=101
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /home/ubuntu/gateway/nginx/conf.d:/etc/nginx/conf.d:ro
      - /home/ubuntu/gateway/nginx/dominios/dot_dev:/usr/share/nginx/html/dot_dev:ro
      - /home/ubuntu/gateway/nginx/dominios/dot_com:/usr/share/nginx/html/dot_com:ro
      - /home/ubuntu/gateway/nginx/keys:/etc/nginx/ssl:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - abitat_network
    depends_on:
      - rapsodia

networks:
  abitat_network:
    external: true